<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Catch Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss: #010810;
    --surface: #0a2540;
    --biolum: #00e5ff;
    --biolum2: #00b4d8;
    --gold: #f0c040;
    --pearl: #e8f4f8;
    --mist: #8ab8cc;
    --special: #ff9d00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--abyss);
    color: var(--pearl);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 80%, rgba(0,180,216,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
      linear-gradient(180deg, #010810 0%, #020d1f 40%, #041628 100%);
    pointer-events: none;
    z-index: 0;
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    background: var(--biolum); opacity: 0;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translateY(100vh); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
  }

  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 3rem 2rem 1.5rem;
    border-bottom: 1px solid rgba(0,229,255,0.12);
  }
  .header-wave {
    position: absolute; bottom: -1px; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--biolum), transparent);
    animation: waveGlow 3s ease-in-out infinite;
  }
  @keyframes waveGlow { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    color: var(--pearl); letter-spacing: 0.08em;
    text-shadow: 0 0 40px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.2);
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 1rem; color: var(--mist);
    font-style: italic; letter-spacing: 0.15em; font-weight: 300;
  }
  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s ease-in-out infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .last-updated { font-size: 0.75rem; color: var(--mist); font-style: italic; margin-top: 0.4rem; opacity: 0.7; }

  .stats-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
    padding: 1.2rem 2rem;
    background: rgba(10,37,64,0.5);
    border-bottom: 1px solid rgba(0,229,255,0.08);
  }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 0.1rem; }
  .stat-value {
    font-family: 'Cinzel Decorative', serif; font-size: 1.6rem;
    color: var(--biolum); text-shadow: 0 0 20px rgba(0,229,255,0.6);
    line-height: 1; transition: all 0.4s;
  }
  .stat-label { font-size: 0.7rem; color: var(--mist); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 300; }
  .stat-divider {
    width: 1px; height: 40px; align-self: center;
    background: linear-gradient(180deg, transparent, rgba(0,229,255,0.3), transparent);
  }

  .tabs {
    position: relative; z-index: 10;
    display: flex; padding: 1.5rem 2rem 0;
    max-width: 1200px; margin: 0 auto;
  }
  .tab-btn {
    font-family: 'Crimson Pro', serif; font-size: 1rem;
    letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
    padding: 0.7rem 2rem; border: none; background: transparent;
    cursor: pointer; position: relative; transition: color 0.3s; color: var(--mist);
  }
  .tab-btn::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px;
    background: var(--biolum); transform: scaleX(0); transition: transform 0.3s;
    box-shadow: 0 0 10px var(--biolum);
  }
  .tab-btn.active { color: var(--pearl); }
  .tab-btn.active::after { transform: scaleX(1); }
  .tab-btn:hover:not(.active) { color: rgba(232,244,248,0.7); }
  .tab-btn.special-tab { color: var(--special); }
  .tab-btn.special-tab.active { color: var(--gold); }
  .tab-btn.special-tab::after { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

  main {
    position: relative; z-index: 10;
    max-width: 1200px; margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  .filter-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--mist); pointer-events: none; }

  input[type="text"], select {
    background: rgba(10,37,64,0.7); border: 1px solid rgba(0,229,255,0.15);
    color: var(--pearl); font-family: 'Crimson Pro', serif; font-size: 0.95rem;
    padding: 0.6rem 1rem 0.6rem 2.4rem; border-radius: 4px; outline: none;
    transition: border-color 0.3s; width: 100%;
  }
  select { padding-left: 1rem; cursor: pointer; }
  input[type="text"]:focus, select:focus { border-color: rgba(0,229,255,0.5); box-shadow: 0 0 0 3px rgba(0,229,255,0.06); }
  select option { background: var(--surface); }

  .sort-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .sort-pill {
    font-family: 'Crimson Pro', serif; font-size: 0.8rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 0.4rem 0.9rem; border-radius: 20px;
    border: 1px solid rgba(0,229,255,0.2); background: transparent;
    color: var(--mist); cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .sort-pill:hover { border-color: rgba(0,229,255,0.4); color: var(--pearl); }
  .sort-pill.active { background: rgba(0,229,255,0.12); border-color: var(--biolum); color: var(--biolum); box-shadow: 0 0 10px rgba(0,229,255,0.1); }

  .table-wrap {
    border: 1px solid rgba(0,229,255,0.1); border-radius: 8px;
    overflow: hidden; background: rgba(4,22,40,0.5); backdrop-filter: blur(10px);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(0,229,255,0.06); border-bottom: 1px solid rgba(0,229,255,0.15); }
  th {
    font-family: 'Crimson Pro', serif; font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--mist); padding: 0.9rem 1.2rem;
    text-align: left; font-weight: 600; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid rgba(0,229,255,0.05); transition: background 0.2s; animation: rowFadeIn 0.4s ease both; }
  @keyframes rowFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  tbody tr:hover { background: rgba(0,229,255,0.04); }
  tbody tr:last-child { border-bottom: none; }
  td { font-size: 0.95rem; padding: 0.85rem 1.2rem; color: var(--pearl); vertical-align: middle; }

  .td-rank { color: var(--mist); font-size: 0.8rem; font-style: italic; width: 50px; }
  .td-angler { font-weight: 600; color: var(--biolum2); }
  .td-fish { font-style: italic; }
  .size-badge {
    display: inline-block; font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 3px;
    font-style: normal; font-weight: 600; margin-left: 0.5rem; vertical-align: middle;
  }
  .size-tiny     { background: rgba(138,184,204,0.15); color: var(--mist); }
  .size-small    { background: rgba(0,180,216,0.12);   color: #5ab8d4; }
  .size-medium   { background: rgba(0,229,255,0.12);   color: var(--biolum2); }
  .size-large    { background: rgba(240,192,64,0.12);  color: var(--gold); }
  .size-enormous { background: rgba(255,107,0,0.15);   color: #ff9d00; }

  .td-weight { font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; }
  .td-weight .unit { font-family: 'Crimson Pro', serif; font-size: 0.8rem; color: var(--mist); margin-left: 2px; }
  .td-time { color: var(--mist); font-size: 0.85rem; font-style: italic; }

  .special-row td { background: rgba(240,192,64,0.03); }
  .special-row:hover td { background: rgba(240,192,64,0.07) !important; }
  .currency-badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    font-size: 0.78rem; letter-spacing: 0.08em; padding: 0.2rem 0.6rem;
    border-radius: 20px; background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.3); color: var(--gold); white-space: nowrap;
  }

  .special-header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
    padding: 1rem 1.5rem; background: rgba(240,192,64,0.05);
    border: 1px solid rgba(240,192,64,0.15); border-radius: 8px;
  }
  .special-header-icon { font-size: 1.8rem; }
  .special-header-text h2 { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: var(--gold); text-shadow: 0 0 20px rgba(240,192,64,0.4); }
  .special-header-text p { font-size: 0.85rem; color: var(--mist); font-style: italic; margin-top: 0.15rem; }

  .currency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .currency-card { background: rgba(4,22,40,0.6); border: 1px solid rgba(240,192,64,0.15); border-radius: 8px; padding: 1.2rem 1.5rem; backdrop-filter: blur(10px); }
  .currency-card-title { font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .currency-leaderboard { list-style: none; }
  .currency-leaderboard li { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; border-bottom: 1px solid rgba(240,192,64,0.06); font-size: 0.9rem; }
  .currency-leaderboard li:last-child { border-bottom: none; }
  .currency-leaderboard .rank-num { color: var(--mist); font-size: 0.75rem; width: 20px; }
  .currency-leaderboard .angler-name { color: var(--biolum2); flex: 1; padding-left: 0.5rem; }
  .currency-leaderboard .amount { font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; color: var(--gold); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--mist); }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state p { font-size: 1rem; font-style: italic; }

  .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .page-btn { font-family: 'Crimson Pro', serif; font-size: 0.85rem; padding: 0.4rem 0.8rem; border: 1px solid rgba(0,229,255,0.15); background: transparent; color: var(--mist); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .page-btn:hover { border-color: rgba(0,229,255,0.4); color: var(--pearl); }
  .page-btn.active { background: rgba(0,229,255,0.12); border-color: var(--biolum); color: var(--biolum); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .loading { text-align: center; padding: 3rem; color: var(--mist); font-style: italic; }
  .loading-fish { font-size: 2rem; animation: bobble 1.5s ease-in-out infinite; display: block; margin-bottom: 1rem; }
  @keyframes bobble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .error-msg {
    background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
    border-radius: 8px; padding: 1.5rem; color: #ff8080; text-align: center; line-height: 1.8;
  }
  .error-msg code { display: block; margin-top: 0.5rem; font-size: 0.78rem; opacity: 0.6; font-family: monospace; word-break: break-all; }

  .new-catch-toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: rgba(4,22,40,0.95); border: 1px solid rgba(0,229,255,0.4);
    border-radius: 8px; padding: 0.9rem 1.4rem; z-index: 100;
    box-shadow: 0 0 30px rgba(0,229,255,0.15); animation: toastIn 0.4s ease;
    max-width: 300px; backdrop-filter: blur(10px);
  }
  .new-catch-toast.special { border-color: rgba(240,192,64,0.5); box-shadow: 0 0 30px rgba(240,192,64,0.2); }
  @keyframes toastIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .toast-title { font-family: 'Cinzel Decorative', serif; font-size: 0.72rem; color: var(--biolum); letter-spacing: 0.1em; margin-bottom: 0.3rem; }
  .toast-title.special { color: var(--gold); }
  .toast-body { font-size: 0.9rem; color: var(--pearl); line-height: 1.4; }
  .toast-body strong { color: var(--biolum2); }

  @media (max-width: 640px) {
    .stats-bar { gap: 1rem; }
    .stat-divider { display: none; }
    td, th { padding: 0.7rem 0.8rem; font-size: 0.85rem; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <h1 class="title">⚓ The Catch Log</h1>
  <p class="subtitle"><span class="live-dot"></span>Live from the stream</p>
  <p class="last-updated" id="lastUpdated">Connecting to database...</p>
  <div class="header-wave"></div>
</header>

<div class="stats-bar">
  <div class="stat-item"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Total Catches</span></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><span class="stat-value" id="statAnglers">—</span><span class="stat-label">Anglers</span></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><span class="stat-value" id="statHeaviest">—</span><span class="stat-label">Heaviest (lbs)</span></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><span class="stat-value" id="statSpecial">—</span><span class="stat-label">Special Catches</span></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('all',this)">All Catches</button>
  <button class="tab-btn special-tab" onclick="switchTab('special',this)">✦ Special Catches</button>
</div>

<main>
  <div class="tab-panel active" id="tab-all">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">⚲</span>
        <input type="text" id="searchAll" placeholder="Search angler or fish..." oninput="applyFilters()">
      </div>
      <select id="sizeFilter" onchange="applyFilters()">
        <option value="">All sizes</option>
        <option value="tiny">Tiny</option>
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large">Large</option>
        <option value="enormous">Enormous</option>
      </select>
      <div class="sort-pills">
        <button class="sort-pill active" onclick="setSort('time',this)">Latest</button>
        <button class="sort-pill" onclick="setSort('weight',this)">Heaviest</button>
        <button class="sort-pill" onclick="setSort('angler',this)">Angler</button>
      </div>
    </div>
    <div id="allContent"><div class="loading"><span class="loading-fish">🐟</span>Hauling in the catch...</div></div>
  </div>

  <div class="tab-panel" id="tab-special">
    <div class="special-header">
      <div class="special-header-icon">🏆</div>
      <div class="special-header-text">
        <h2>Legendary & Special Catches</h2>
        <p>Rare fish and wallet finds that reward bonus currencies</p>
      </div>
    </div>
    <div id="currencyCards" class="currency-grid"></div>
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">⚲</span>
        <input type="text" id="searchSpecial" placeholder="Search angler or fish..." oninput="applySpecialFilters()">
      </div>
      <div class="sort-pills">
        <button class="sort-pill active" onclick="setSpecialSort('time',this)">Latest</button>
        <button class="sort-pill" onclick="setSpecialSort('amount',this)">Most Coins</button>
        <button class="sort-pill" onclick="setSpecialSort('angler',this)">Angler</button>
      </div>
    </div>
    <div id="specialContent"><div class="loading"><span class="loading-fish">🌟</span>Seeking the legendary...</div></div>
  </div>
</main>

<script>
// ── Config ───────────────────────────────────────────────────────
const API = 'https://mhtiosfhklwazokjscho.supabase.co/functions/v1/get-catches';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1odGlvc2Zoa2x3YXpva2pzY2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1OTY1OTMsImV4cCI6MjA3NzE3MjU5M30.kngMjoWZaFTF6MqO_2W9s3WXSaMyIWzmEvbCCR8z-4c';
const PAGE_SIZE = 25;

// ── State ────────────────────────────────────────────────────────
let allCatches = [], specialCatches = [];
let filteredAll = [], filteredSpecial = [];
let sortAll = 'time', sortSpecial = 'time';
let pageAll = 1, pageSpecial = 1;
let knownIds = new Set();
let isFirstLoad = true;

// ── Particles ────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('particles');
  for(let i=0;i<30;i++){
    const p=document.createElement('div'); p.className='particle';
    const s=Math.random()*3+1;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*15}s;animation-delay:${Math.random()*15}s;opacity:0`;
    c.appendChild(p);
  }
})();

// ── Fetch via Edge Function (handles CORS) ────────────────────────
async function fetchData() {
  const res = await fetch(API, {
    method: 'GET',
    headers: {
      'Authorization': `Bearer ${KEY}`,
      'x-game-api-key': 'catchingfish'
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  return res.json();
}

// ── Main load / poll ─────────────────────────────────────────────
async function loadData() {
  try {
    const data = await fetchData();

    // Show toast for any new rows since last poll
    if (!isFirstLoad) {
      data.forEach(c => { if (!knownIds.has(c.id)) showToast(c); });
    }
    knownIds = new Set(data.map(c => c.id));
    isFirstLoad = false;

    allCatches     = data;
    specialCatches = data.filter(c => c.is_special);

    updateStats();
    applyFilters();
    applySpecialFilters();
    buildCurrencyCards();

    document.getElementById('lastUpdated').textContent =
      'Last updated ' + new Date().toLocaleTimeString();

  } catch(err) {
    console.error('Fetch error:', err);
    document.getElementById('lastUpdated').textContent = '⚠ Could not reach database — retrying in 30s';
    if (isFirstLoad) {
      const msg = `<div class="error-msg">Could not connect to database.<br>Make sure the <strong>get-catches</strong> Edge Function is deployed.<code>${err.message}</code></div>`;
      document.getElementById('allContent').innerHTML     = msg;
      document.getElementById('specialContent').innerHTML = msg;
    }
  }
}

// ── Stats (animated) ─────────────────────────────────────────────
function updateStats() {
  animCount('statTotal',    allCatches.length);
  animCount('statAnglers',  new Set(allCatches.map(c=>c.user_name)).size);
  animCount('statHeaviest', allCatches.reduce((m,c)=>Math.max(m,c.weight||0),0));
  animCount('statSpecial',  specialCatches.length);
}
function animCount(id, target) {
  const el=document.getElementById(id);
  const from=parseInt(el.textContent.replace(/,/g,''))||0;
  if(from===target){el.textContent=target.toLocaleString();return;}
  let cur=from;
  const step=Math.max(1,Math.ceil(Math.abs(target-from)/20));
  const iv=setInterval(()=>{
    cur=cur<target?Math.min(cur+step,target):Math.max(cur-step,target);
    el.textContent=cur.toLocaleString();
    if(cur===target)clearInterval(iv);
  },40);
}

// ── Currency leaderboard cards ───────────────────────────────────
function buildCurrencyCards() {
  const icons={CliffCoins:'⛰️',GUANCE:'💰',DD:'🎯',MarbleCoins:'🔮'};
  const totals={};
  specialCatches.forEach(c=>{
    if(!c.currency_type)return;
    if(!totals[c.currency_type])totals[c.currency_type]={};
    totals[c.currency_type][c.user_name]=(totals[c.currency_type][c.user_name]||0)+(c.currency_amount||0);
  });
  const container=document.getElementById('currencyCards');
  container.innerHTML='';
  if(!Object.keys(totals).length){
    container.innerHTML='<p style="color:var(--mist);font-style:italic;padding:1rem 0">No special catches yet.</p>';
    return;
  }
  Object.entries(totals).forEach(([type,users])=>{
    const sorted=Object.entries(users).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const card=document.createElement('div'); card.className='currency-card';
    card.innerHTML=`
      <div class="currency-card-title">${icons[type]||'✦'} ${type} Leaderboard</div>
      <ul class="currency-leaderboard">
        ${sorted.map(([name,amt],i)=>`
          <li>
            <span class="rank-num">#${i+1}</span>
            <span class="angler-name">${esc(name)}</span>
            <span class="amount">${amt.toLocaleString()}</span>
          </li>`).join('')}
      </ul>`;
    container.appendChild(card);
  });
}

// ── Sort ─────────────────────────────────────────────────────────
function sortData(arr,by){
  arr.sort((a,b)=>{
    if(by==='weight')   return (b.weight||0)-(a.weight||0);
    if(by==='angler')   return (a.user_name||'').localeCompare(b.user_name||'');
    if(by==='currency') return (b.currency_amount||0)-(a.currency_amount||0);
    return new Date(b.caught_at||0)-new Date(a.caught_at||0);
  });
}
function setSort(val,btn){
  sortAll=val;
  document.querySelectorAll('#tab-all .sort-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); pageAll=1; applyFilters();
}
function setSpecialSort(val,btn){
  sortSpecial=val;
  document.querySelectorAll('#tab-special .sort-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); pageSpecial=1; applySpecialFilters();
}

// ── Filters ──────────────────────────────────────────────────────
function applyFilters(){
  const q=(document.getElementById('searchAll').value||'').toLowerCase();
  const size=document.getElementById('sizeFilter').value;
  filteredAll=allCatches.filter(c=>!c.is_special);
  if(q)    filteredAll=filteredAll.filter(c=>(c.user_name||'').toLowerCase().includes(q)||(c.fish_name||'').toLowerCase().includes(q));
  if(size) filteredAll=filteredAll.filter(c=>(c.fish_size||'').toLowerCase()===size);
  sortData(filteredAll,sortAll); pageAll=1;
  renderTable('allContent',filteredAll,false,pageAll);
}
function applySpecialFilters(){
  const q=(document.getElementById('searchSpecial').value||'').toLowerCase();
  filteredSpecial=[...specialCatches];
  if(q) filteredSpecial=filteredSpecial.filter(c=>(c.user_name||'').toLowerCase().includes(q)||(c.fish_name||'').toLowerCase().includes(q));
  sortData(filteredSpecial,sortSpecial==='amount'?'currency':sortSpecial); pageSpecial=1;
  renderTable('specialContent',filteredSpecial,true,pageSpecial);
}

// ── Render table ─────────────────────────────────────────────────
function renderTable(id,data,isSpecial,page){
  const el=document.getElementById(id);
  if(!data.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">${isSpecial?'🌟':'🎣'}</div><p>No catches found.</p></div>`;
    return;
  }
  const totalPages=Math.ceil(data.length/PAGE_SIZE);
  const start=(page-1)*PAGE_SIZE;
  const slice=data.slice(start,start+PAGE_SIZE);

  const rows=slice.map((c,i)=>{
    const size=(c.fish_size||'').toLowerCase();
    const sizeBadge=size?`<span class="size-badge size-${size}">${size}</span>`:'';
    const currBadge=(c.is_special&&c.currency_type)
      ?`<span class="currency-badge">✦ ${(c.currency_amount||0).toLocaleString()} ${esc(c.currency_type)}</span>`:'';
    return `<tr class="${c.is_special?'special-row':''}" style="animation-delay:${(i%PAGE_SIZE)*0.02}s">
      <td class="td-rank">${start+i+1}</td>
      <td class="td-angler">${esc(c.user_name||'Unknown')}</td>
      <td class="td-fish">${esc(c.fish_name||'Unknown')}${sizeBadge}</td>
      <td class="td-weight">${(c.weight||0).toLocaleString()}<span class="unit">lbs</span></td>
      ${isSpecial?`<td>${currBadge}</td>`:''}
      <td class="td-time hide-mobile">${formatTime(c.caught_at)}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Angler</th><th>Fish</th><th>Weight</th>
          ${isSpecial?'<th>Currency Won</th>':''}
          <th class="hide-mobile">Time</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${totalPages>1?renderPagination(page,totalPages,id):''}`;
}

function renderPagination(current,total,id){
  let s=Math.max(1,current-3),e=Math.min(total,s+6);
  if(e-s<6)s=Math.max(1,e-6);
  let pages='';
  for(let i=s;i<=e;i++)
    pages+=`<button class="page-btn${i===current?' active':''}" onclick="goPage(${i},'${id}')">${i}</button>`;
  return `<div class="pagination">
    <button class="page-btn" onclick="goPage(${current-1},'${id}')" ${current<=1?'disabled':''}>‹</button>
    ${pages}
    <button class="page-btn" onclick="goPage(${current+1},'${id}')" ${current>=total?'disabled':''}>›</button>
  </div>`;
}

function goPage(p,id){
  if(id==='allContent'){pageAll=p;renderTable('allContent',filteredAll,false,pageAll);}
  else{pageSpecial=p;renderTable('specialContent',filteredSpecial,true,pageSpecial);}
  document.querySelector('main').scrollIntoView({behavior:'smooth'});
}

// ── Toast ────────────────────────────────────────────────────────
function showToast(c){
  const t=document.createElement('div');
  t.className='new-catch-toast'+(c.is_special?' special':'');
  t.innerHTML=`
    <div class="toast-title${c.is_special?' special':''}">
      ${c.is_special?'✦ Special Catch!':'🎣 New Catch!'}
    </div>
    <div class="toast-body">
      <strong>${esc(c.user_name||'Someone')}</strong> caught
      a ${esc(c.fish_size||'')} <em>${esc(c.fish_name||'fish')}</em>
      ${c.is_special?`<br><span style="color:var(--gold)">+${(c.currency_amount||0).toLocaleString()} ${esc(c.currency_type||'')}</span>`:''}
    </div>`;
  document.body.appendChild(t);
  setTimeout(()=>{
    t.style.transition='opacity 0.5s,transform 0.5s';
    t.style.opacity='0';t.style.transform='translateY(20px)';
    setTimeout(()=>t.remove(),500);
  },4000);
}

// ── Tab switching ────────────────────────────────────────────────
function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── Helpers ──────────────────────────────────────────────────────
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(ts){
  if(!ts)return'—';
  try{
    const d=new Date(ts),diff=(Date.now()-d)/1000;
    if(diff<60)    return'just now';
    if(diff<3600)  return`${Math.floor(diff/60)}m ago`;
    if(diff<86400) return`${Math.floor(diff/3600)}h ago`;
    if(diff<604800)return`${Math.floor(diff/86400)}d ago`;
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }catch{return'—';}
}

// ── Init ─────────────────────────────────────────────────────────
loadData();
setInterval(loadData, 30000);
</script>
